<button id="clearCacheBtn" title="مسح الكاش" style="position:fixed;top:12px;left:12px;z-index:99999;width:36px;height:36px;border-radius:50%;background:#0A2218;border:1.5px solid #D4AF37;color:#D4AF37;font-size:16px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;">🔄</button>
<script>
document.getElementById('clearCacheBtn').onclick = async function(){
  try{
    localStorage.clear();
    sessionStorage.clear();
    if('caches' in window){ const ks=await caches.keys(); for(const k of ks) await caches.delete(k); }
    if(navigator.serviceWorker){ const regs=await navigator.serviceWorker.getRegistrations(); for(const r of regs) await r.unregister(); }
    alert('تم مسح الكاش ✅ سيتم إعادة التحميل');
    location.href = location.href.split('?')[0] + '?v=' + Date.now();
  }catch(e){ alert('مسح الكاش: '+e); location.reload(true); }
};
</script>
