<script>
(() => {
  const FIXED = "حاسب نفسك";
  // Lock document title
  Object.defineProperty(document, 'title', {
    get: () => FIXED,
    set: () => {}
  });
  // Force all elements containing old word
  const fix = () => {
    document.querySelectorAll('*').forEach(el=>{
      if(el.childNodes.length===1 && el.childNodes[0].nodeType===3){
        if(el.textContent.includes('قرب') || el.textContent.includes('قُرب') || el.textContent.trim()==='Qurb'){
          el.textContent = FIXED;
        }
      }
    });
    let t = document.querySelector('h1');
    if(t) t.textContent = FIXED;
